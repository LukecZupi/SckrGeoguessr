<!DOCTYPE html>
<html>

<head>
    <title>ScKr Geoguessr</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index_style.css') }}">
</head>

<body>
    <div class="container">
        <marquee behavior="alternate" scrollamount="3" loop="">
            <h1>ScKr GeoGuessr</h1>
        </marquee>
        <div class="podatki">
            <p>Najdite pravo učilnico glede na prikazano sliko!</p>

            <strong>Katere učilnice so vključene:</strong>

            <p>
                učilnice označene z številkami (pritličje)<br>
                Knjižnica<br>
                Fab lab<br>
            </p>
            <p>
                Zelo pomembno je čim manjše število poskusov. <br>Šteje se tudi skupni čas posamezne igre. <br>
                <strong id="srecno">Vso srečo :]</strong>
            </p>
            <div id="difficulty-section">
                <p><strong>Izberite še težavnost slik!</strong></p>
                <button id="easyBtn" class="difficulty">Easy</button>
                <button id="hardBtn" class="difficulty">Hard</button>
                <div id="confirm-container" style="display:none; margin-top:10px;">
                    <button id="reset">Potrdi in začni igro</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var selected = null;
            var easyBtn = document.getElementById('easyBtn');
            var hardBtn = document.getElementById('hardBtn');
            var confirmContainer = document.getElementById('confirm-container');
            var confirmBtn = document.getElementById('reset');

            function selectDifficulty(name, btn) {
                selected = name;
                easyBtn.classList.remove('selected');
                hardBtn.classList.remove('selected');
                btn.classList.add('selected');
                confirmContainer.style.display = 'block';
            }

            easyBtn.addEventListener('click', function() { selectDifficulty('easy', easyBtn), confirmBtn.innerHTML = "Potrdi in začni igro (Lahko)"; });
            hardBtn.addEventListener('click', function() { selectDifficulty('hard', hardBtn), confirmBtn.innerHTML = "Potrdi in začni igro (Težko)"; });

            confirmBtn.addEventListener('click', function() {
                if (!selected) return;
                window.location.href = '/game?difficulty=' + encodeURIComponent(selected);
            });
        })();
    </script>
</body>

</html>
