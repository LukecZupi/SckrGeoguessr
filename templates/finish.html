<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Konec igre</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/finish_style.css') }}">
</head>
<body>
    <div class="container">
        {% if result == "win" %}
        <h1>Bravo! Našli ste pravo učilnico!</h1>
        {% else %}
        <h1>Niste našli prave učilnice :(</h1>
        {% endif %}
        <div class="podatki">
            <p><strong>Število poskusov: {{ guesses }}</strong></p>
            <p><strong>Pravilna učilnica: {{ correctClassroom }}</strong></p><br>
            <p><strong>Kliknjene učilnice: </strong></p>

            {% for classroom in guessedClassrooms %}
            <p>{{ classroom }}</p>
            {% endfor %}
            <br>
            <div>
                <div id="confirm" style="margin-top:10px;">
                    <a href="/control"><button id="reset">Poskusi šeenkrat</button></a>
                </div>
            </div>
        </div>
</body>
</html>
